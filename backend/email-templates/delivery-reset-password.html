<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Your Delivery Partner Password</title>
  <style>
    body { font-family: Arial, sans-serif; color: #222; background: #f9f9f9; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px #0001; padding: 32px; }
    .btn { display: inline-block; background: #0b5fff; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    .footer { margin-top: 32px; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>
    <p>Hello,</p>
    <p>We received a request to reset your Delivery Partner password. Click the button below to set a new password:</p>
    <p style="text-align:center; margin: 32px 0;">
      <a href="{{resetLink}}" class="btn">Reset Password</a>
    </p>
    <p>If you did not request this, you can safely ignore this email.</p>
    <div class="footer">
      &copy; {{year}} Ashirwad Enterprises
    </div>
  </div>
</body>
</html>
